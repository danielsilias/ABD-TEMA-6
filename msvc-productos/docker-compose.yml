services:
  db-mysql:
    image: mysql:8.0
    container_name: db-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: db_productos
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - red-microservicios
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  msvc-productos:
    image: msvc-parent-project-msvc-productos:latest
    container_name: msvc-productos
    ports:
      - "8081:8081"
    networks:
      - red-microservicios
    depends_on:
      db-mysql:
        condition: service_healthy

volumes:
  db_data:

networks:
  red-microservicios:
    driver: bridge